<!DOCTYPE html>
<html>
<head>
  <title>BetterWebSchedule</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-wrapper">
    <div class="popup-header">
      <div class="popup-header-row">
        <img src="iconpopup400.png" alt="Calendar Icon" class="popup-icon">
        <h1>BetterWebSchedule</h1>
      </div>
      <p class="subtitle">Enhance your SMCCD schedule</p>
    </div>

    <div class="popup-section">
      <h2>Schedule Features</h2>
      <label class="switch-label">
        <span>Dark Mode</span>
        <input type="checkbox" id="darkToggle">
        <span class="slider"></span>
      </label>
      <label class="switch-label">
        <span>Color Blocks</span>
        <input type="checkbox" id="colorBlockToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="popup-footer">
      <p class="update">Data Last Updated: 04/02/2025</p>
      <p class="note">This extension is not affiliated with SMCCD</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
